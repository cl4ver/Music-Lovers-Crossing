<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Lovers Crossing - 爱乐评友会</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            
            --accent-primary: #d4a574;
            --accent-secondary: #8b7355;
            --accent-gradient: linear-gradient(135deg, #d4a574, #c9956a, #8b7355);
            --accent-glow: rgba(212, 165, 116, 0.4);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(212, 165, 116, 0.3);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px var(--accent-glow);
            
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(212, 165, 116, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 115, 85, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(212, 165, 116, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 570px 1fr;
            gap: 1.5rem;
            min-height: calc(100vh - 60px);
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 480px 1fr;
            }
        }

        @media (max-width: 1100px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 0.5rem;
            padding: 1.2rem 1.5rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 700;
            font-style: italic;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f5e6d3 0%, #d4a574 40%, #c9956a 60%, #8b7355 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(212, 165, 116, 0.3);
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.5), transparent);
        }

        .header-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .upload-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .upload-section input[type="file"] {
            display: none;
        }

        .upload-btn {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-normal);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .upload-btn:hover {
            background: rgba(212, 165, 116, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .stats-info {
            color: var(--text-muted);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        /* Left Section - Player + Playlist */
        .left-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Player */
        .player-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            animation: fadeIn 0.6s ease-out;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .album-cover-container {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            background: #0d0d0d;
            box-shadow: 
                0 0 0 3px #1a1a1a,
                0 0 0 4px #2a2a2a,
                var(--shadow-md);
            flex-shrink: 0;
        }

        .album-cover-wrapper {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            overflow: hidden;
        }

        .album-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }

        .album-cover-container.playing .album-cover-wrapper {
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .album-cover-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12%;
            padding-bottom: 12%;
            background: var(--bg-primary);
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .album-placeholder {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--bg-tertiary), var(--bg-secondary));
        }

        .album-placeholder-icon {
            font-size: 2.2rem;
            opacity: 0.3;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        .player-info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .song-info h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            color: var(--text-primary);
        }

        .song-info .artist {
            font-size: 0.9rem;
            color: var(--accent-primary);
            margin-bottom: 0.15rem;
        }

        .song-info .album {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.75rem;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .controls button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .controls button:hover {
            color: var(--accent-primary);
            transform: scale(1.1);
        }

        .controls .prev-btn, .controls .next-btn {
            width: 34px;
            height: 34px;
            font-size: 0.9rem;
        }

        .controls .play-btn {
            width: 44px;
            height: 44px;
            font-size: 1.1rem;
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 3px 12px var(--accent-glow);
        }

        .controls .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 18px var(--accent-glow);
        }

        .progress-section {
            flex: 1;
            min-width: 0;
        }

        .progress-container {
            margin-top: 0;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(212, 165, 116, 0.15);
            border-radius: 2px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-bar:hover {
            height: 6px;
        }

        .progress {
            height: 100%;
            background: var(--accent-gradient);
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 0.3rem;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-variant-numeric: tabular-nums;
        }

        /* Playlist */
        .playlist-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 1rem;
            flex: 1;
            overflow-y: auto;
            max-height: 900px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .playlist-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .playlist-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
        }

        .playlist-actions {
            display: flex;
            gap: 0.4rem;
        }

        .playlist-actions button {
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .playlist-actions button:hover {
            background: rgba(212, 165, 116, 0.2);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .playlist-actions button.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 0.5rem;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-normal);
            gap: 0.6rem;
        }

        .song-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-color);
            transform: translateX(4px);
        }

        .song-item.active {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(139, 115, 85, 0.1));
            border-color: var(--border-glow);
        }

        .song-item.unmatched {
            opacity: 0.5;
        }

        .song-item.unmatched:hover {
            opacity: 0.8;
        }

        .song-item-cover {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .song-item-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-item-cover .placeholder-icon {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .song-item.active .song-item-cover {
            background: var(--accent-gradient);
        }

        .song-item.active .song-item-cover .placeholder-icon {
            color: white;
        }

        .song-item-info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .song-item-title {
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 0.1rem;
        }

        .song-item-artist {
            font-size: 0.72rem;
            color: var(--text-secondary);
        }

        .song-status-icon {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #22c55e;
        }

        .song-status-icon.unmatched {
            background: transparent;
        }

        /* Right: Metadata */
        .right-section {
            display: flex;
            flex-direction: column;
        }

        .metadata-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            flex: 1;
            overflow-y: auto;
            animation: fadeIn 0.6s ease-out;
        }

        .metadata-header {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-primary);
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        @media (max-width: 600px) {
            .metadata-grid {
                grid-template-columns: 1fr;
            }
        }

        .metadata-item {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 0.6rem;
        }

        .metadata-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .metadata-value {
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .metadata-value.highlight {
            color: var(--accent-primary);
            font-weight: 500;
        }

        .metadata-full {
            grid-column: 1 / -1;
        }

        .metadata-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }

        .metadata-tag {
            padding: 0.2rem 0.5rem;
            background: rgba(212, 165, 116, 0.2);
            color: var(--accent-primary);
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .metadata-comments {
            white-space: pre-wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.7rem;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        /* Scrollbar */
        .playlist-section::-webkit-scrollbar,
        .metadata-section::-webkit-scrollbar {
            width: 5px;
        }

        .playlist-section::-webkit-scrollbar-track,
        .metadata-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .playlist-section::-webkit-scrollbar-thumb,
        .metadata-section::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>Music Lovers Crossing</h1>
            <span class="header-subtitle">爱乐评友会</span>
        </div>
        <div class="upload-section">
            <label class="upload-btn">
                <i class="fas fa-file-excel"></i> 元数据Excel
                <input type="file" id="excelInput" accept=".xlsx,.xls">
            </label>
            <label class="upload-btn">
                <i class="fas fa-folder-plus"></i> 添加音乐
                <input type="file" id="folderInput" webkitdirectory directory multiple accept="audio/*">
            </label>
            <span class="stats-info" id="statsInfo">已匹配: 0 / 0</span>
        </div>
    </div>

    <div class="container">
        <!-- Left: Player + Playlist -->
        <div class="left-section">
            <!-- Player -->
            <div class="player-section">
                <div class="now-playing">
                    <div class="album-cover-container" id="albumCoverContainer">
                        <div class="album-cover-wrapper">
                            <img class="album-cover-img" id="albumCoverImg" style="display: none;" src="" alt="Album Art">
                            <div class="album-placeholder" id="albumPlaceholder">
                                <span class="album-placeholder-icon">🎵</span>
                            </div>
                        </div>
                    </div>
                    <div class="player-info">
                        <div class="song-info">
                            <h2 id="songTitle">选择一首歌曲</h2>
                            <p class="artist" id="artistName">-</p>
                            <p class="album" id="albumName">-</p>
                        </div>
                        <div class="player-controls">
                            <div class="controls">
                                <button class="prev-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
                                <button class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
                                <button class="next-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
                            </div>
                            <div class="progress-section">
                                <div class="progress-container">
                                    <div class="progress-bar" id="progressBar">
                                        <div class="progress" id="progress"></div>
                                    </div>
                                    <div class="time-display">
                                        <span id="currentTime">0:00</span>
                                        <span id="duration">0:00</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Playlist -->
            <div class="playlist-section">
                <div class="playlist-header">
                    <h2 class="playlist-title" id="playlistTitle">播放列表</h2>
                    <div class="playlist-actions">
                        <button id="toggleUnmatchedBtn" title="显示/隐藏未匹配歌曲">
                            <i class="fas fa-eye-slash"></i> 未匹配
                        </button>
                    </div>
                </div>
                <span class="playlist-count" id="playlistCount">请先选择元数据Excel</span>
                <div class="song-list" id="songList"></div>
            </div>
        </div>

        <!-- Right: Metadata -->
        <div class="right-section">
            <div class="metadata-section" id="metadataSection">
                <div class="metadata-header">
                    <i class="fas fa-compact-disc"></i> 歌曲详情
                </div>
                <div class="empty-state" id="emptyMetadata">
                    <div class="icon">📝</div>
                    <p>请从播放列表选择一首歌曲</p>
                </div>
                <div class="metadata-content" id="metadataContent" style="display: none;">
                    <div class="metadata-grid">
                        <div class="metadata-item">
                            <div class="metadata-label">标题</div>
                            <div class="metadata-value highlight" id="metaTitle">-</div>
                        </div>
                        <div class="metadata-item">
                            <div class="metadata-label">艺术家</div>
                            <div class="metadata-value" id="metaArtist">-</div>
                        </div>
                        <div class="metadata-item">
                            <div class="metadata-label">唱片集</div>
                            <div class="metadata-value" id="metaAlbum">-</div>
                        </div>
                        <div class="metadata-item">
                            <div class="metadata-label">年份</div>
                            <div class="metadata-value" id="metaYear">-</div>
                        </div>
                        <div class="metadata-item">
                            <div class="metadata-label">时长</div>
                            <div class="metadata-value" id="metaDuration">-</div>
                        </div>
                        <div class="metadata-item">
                            <div class="metadata-label">格式</div>
                            <div class="metadata-value" id="metaFormat">-</div>
                        </div>
                        <div class="metadata-item metadata-full">
                            <div class="metadata-label">艺术家介绍</div>
                            <div class="metadata-comments" id="metaArtistIntro"></div>
                        </div>
                        <div class="metadata-item metadata-full">
                            <div class="metadata-label">荣誉标签</div>
                            <div class="metadata-tags" id="metaHonorTags"></div>
                        </div>
                        <div class="metadata-item metadata-full">
                            <div class="metadata-label">特色标签</div>
                            <div class="metadata-tags" id="metaFeatureTags"></div>
                        </div>
                        <div class="metadata-item metadata-full">
                            <div class="metadata-label">AI乐评</div>
                            <div class="metadata-comments" id="metaComments"></div>
                        </div>
                        <div class="metadata-item metadata-full">
                            <div class="metadata-label">网友乐评</div>
                            <div class="metadata-comments" id="metaUserReview"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        网页贡献：红猪与吉娜唱片店（Porco Rosso and Gina's Record Store） · OpenWork+AI
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const folderInput = document.getElementById('folderInput');
        const excelInput = document.getElementById('excelInput');
        const songListEl = document.getElementById('songList');
        const playlistCountEl = document.getElementById('playlistCount');
        const statsInfoEl = document.getElementById('statsInfo');
        const toggleUnmatchedBtn = document.getElementById('toggleUnmatchedBtn');
        const albumCoverContainer = document.getElementById('albumCoverContainer');
        const albumCoverImg = document.getElementById('albumCoverImg');
        const albumPlaceholder = document.getElementById('albumPlaceholder');
        
        let allSongs = [];
        let matchedSongs = new Map();
        let matchedIndexes = [];
        let currentIndex = -1;
        let currentMatchedIndex = -1;
        let isPlaying = false;
        let showUnmatched = true;
        let excelFileName = '';

        const columnMap = {
            filename: 0,
            title: 1,
            artist: 2,
            album: 3,
            year: 4,
            duration: 5,
            format: 6,
            honorTags: 9,
            featureTags: 10,
            comments: 11,
            userReview: null,
            artistIntro: null
        };

        async function loadExcelFromFile(file) {
            try {
                excelFileName = file.name.replace(/\.[^/.]+$/, '');
                
                const arrayBuffer = await file.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                if (jsonData.length < 2) {
                    alert('Excel文件为空');
                    return;
                }
                
                const headers = jsonData[0];
                columnMap.filename = headers.indexOf('文件名');
                columnMap.title = headers.indexOf('标题');
                columnMap.artist = headers.indexOf('艺术家');
                columnMap.album = headers.indexOf('唱片集');
                columnMap.year = headers.indexOf('年份');
                columnMap.duration = headers.indexOf('时长');
                columnMap.format = headers.indexOf('格式');
                columnMap.honorTags = headers.indexOf('荣誉标签');
                columnMap.featureTags = headers.indexOf('特色标签');
                columnMap.comments = headers.indexOf('AI乐评');
                columnMap.userReview = headers.indexOf('网友乐评');
                columnMap.artistIntro = headers.indexOf('艺术家介绍');
                
                for (let i = 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (!row[columnMap.title]) continue;
                    
                    const song = {
                        id: i,
                        filename: row[columnMap.filename] || '',
                        title: row[columnMap.title] || '',
                        artist: row[columnMap.artist] || '未知艺术家',
                        album: row[columnMap.album] || '',
                        year: row[columnMap.year] || '',
                        duration: row[columnMap.duration] || '',
                        format: row[columnMap.format] || '',
                        honorTags: parseTags(row[columnMap.honorTags]),
                        featureTags: parseTags(row[columnMap.featureTags]),
                        comments: row[columnMap.comments] || '',
                        userReview: columnMap.userReview !== -1 ? (row[columnMap.userReview] || '') : '',
                        artistIntro: columnMap.artistIntro !== -1 ? (row[columnMap.artistIntro] || '') : '',
                        matched: false,
                        url: null,
                        picture: null
                    };
                    
                    allSongs.push(song);
                }
                
                updateMatchedIndexes();
                renderPlaylist();
                updateStats();
                
                if (excelFileName) {
                    document.getElementById('playlistTitle').textContent = excelFileName;
                }
                
            } catch (error) {
                console.error('加载Excel失败:', error);
                alert('加载歌曲元数据失败，请确保Excel文件在同级目录');
            }
        }

        function parseTags(value) {
            if (!value) return [];
            return String(value).split('；').map(t => t.trim()).filter(t => t);
        }

        function formatTagsAsHtml(tags) {
            if (!tags || tags.length === 0) return '<span style="color: var(--text-muted)">-</span>';
            return tags.map(t => `<span class="metadata-tag">${t}</span>`).join('');
        }

        function formatCommentsAsHtml(comments) {
            if (!comments) return '-';
            return comments.split('；').map(c => c.trim()).filter(c => c).join('\n');
        }

        function getMatchKey(title, artist) {
            return `${artist}|${title}`.toLowerCase().trim();
        }

        function updateMatchedIndexes() {
            matchedIndexes = allSongs
                .map((song, index) => ({ song, index }))
                .filter(item => item.song.matched)
                .map(item => item.index);
            currentMatchedIndex = matchedIndexes.length > 0 ? 0 : -1;
        }

        async function renderPlaylist() {
            songListEl.innerHTML = '';
            
            for (let i = 0; i < allSongs.length; i++) {
                const song = allSongs[i];
                
                if (!showUnmatched && !song.matched) continue;
                
                const item = document.createElement('div');
                item.className = `song-item ${song.matched ? '' : 'unmatched'} ${i === currentIndex ? 'active' : ''}`;
                item.onclick = () => playSong(i);
                
                let coverHtml = `<span class="placeholder-icon">♪</span>`;
                if (song.picture) {
                    try {
                        const blob = new Blob([new Uint8Array(song.picture.data)], { type: song.picture.format });
                        const url = URL.createObjectURL(blob);
                        coverHtml = `<img src="${url}" alt="">`;
                    } catch (e) {
                        console.error('封面加载失败:', e);
                    }
                }
                
                item.innerHTML = `
                    <div class="song-item-cover">
                        ${coverHtml}
                    </div>
                    <div class="song-item-info">
                        <div class="song-item-title">${song.title}</div>
                        <div class="song-item-artist">${song.artist}</div>
                    </div>
                    <div class="song-status-icon ${song.matched ? 'matched' : 'unmatched'}"></div>
                `;
                
                songListEl.appendChild(item);
            }
            
            const titleText = excelFileName ? excelFileName : '播放列表';
            playlistCountEl.textContent = `${titleText} · ${allSongs.length} 首歌曲`;
        }

        function updateStats() {
            const matched = allSongs.filter(s => s.matched).length;
            statsInfoEl.textContent = `已匹配: ${matched} / ${allSongs.length}`;
        }

        async function loadLocalFiles(files) {
            const validFiles = Array.from(files).filter(f => 
                f.type.startsWith('audio/') || f.name.match(/\.(mp3|wav|ogg|m4a|flac)$/i)
            );
            
            console.log(`找到 ${validFiles.length} 个音频文件`);
            
            let matchCount = 0;
            
            for (const file of validFiles) {
                const url = URL.createObjectURL(file);
                
                const metadata = await readMetadata(file);
                const key = getMatchKey(metadata.title || file.name.replace(/\.[^/.]+$/, ''), metadata.artist || '未知艺术家');
                
                for (const song of allSongs) {
                    const songKey = getMatchKey(song.title, song.artist);
                    if (key === songKey) {
                        song.matched = true;
                        song.url = url;
                        song.file = file;
                        song.localTitle = metadata.title;
                        song.localArtist = metadata.artist;
                        
                        if (metadata.picture) {
                            song.picture = metadata.picture;
                        }
                        
                        matchCount++;
                        break;
                    }
                }
            }
            
            console.log(`匹配成功: ${matchCount} 首`);
            
            updateMatchedIndexes();
            renderPlaylist();
            updateStats();
            
            if (matchCount > 0 && currentIndex === -1) {
                const firstMatchedIndex = allSongs.findIndex(s => s.matched);
                if (firstMatchedIndex !== -1) {
                    playSong(firstMatchedIndex);
                }
            }
        }

        function readMetadata(file) {
            return new Promise((resolve) => {
                jsmediatags.read(file, {
                    onSuccess: function(tag) {
                        const tags = tag.tags;
                        
                        const getString = (val) => {
                            if (val === null || val === undefined) return '';
                            if (typeof val === 'string') return val;
                            if (typeof val === 'number') return String(val);
                            if (typeof val === 'object') {
                                if (val.year) return String(val.year);
                                if (val.date) return String(val.date);
                                return JSON.stringify(val).replace(/[^0-9]/g, '').substring(0, 4) || '';
                            }
                            return '';
                        };
                        
                        const getYear = () => {
                            const fields = ['year', 'recordingTime', 'date', 'TDRC', 'TYER', 'RECORDINGTIME'];
                            for (const f of fields) {
                                const val = tags[f];
                                if (val !== null && val !== undefined) {
                                    const str = getString(val);
                                    if (str && str.length >= 4) {
                                        return str.substring(0, 4);
                                    } else if (str) {
                                        return str;
                                    }
                                }
                            }
                            return '未知';
                        };
                        
                        const getTitle = () => {
                            const fields = ['title', 'TIT2'];
                            for (const f of fields) {
                                const val = tags[f];
                                if (val !== null && val !== undefined) {
                                    const str = getString(val);
                                    if (str) return str;
                                }
                            }
                            return file.name.replace(/\.[^/.]+$/, "");
                        };
                        
                        const getArtist = () => {
                            const fields = ['artist', 'TPE1'];
                            for (const f of fields) {
                                const val = tags[f];
                                if (val !== null && val !== undefined) {
                                    const str = getString(val);
                                    if (str) return str;
                                }
                            }
                            return '未知艺术家';
                        };
                        
                        const getAlbum = () => {
                            const fields = ['album', 'TALB'];
                            for (const f of fields) {
                                const val = tags[f];
                                if (val !== null && val !== undefined) {
                                    const str = getString(val);
                                    if (str) return str;
                                }
                            }
                            return '';
                        };
                        
                        resolve({
                            title: getTitle(),
                            artist: getArtist(),
                            album: getAlbum(),
                            year: getYear(),
                            picture: tags.picture
                        });
                    },
                    onError: function() {
                        resolve({
                            title: file.name.replace(/\.[^/.]+$/, ""),
                            artist: '未知艺术家',
                            album: '',
                            year: '未知',
                            picture: null
                        });
                    }
                });
            });
        }

        async function playSong(index) {
            const song = allSongs[index];
            
            currentIndex = index;
            if (song.matched) {
                currentMatchedIndex = matchedIndexes.indexOf(index);
            }
            
            const titleEl = document.getElementById('songTitle');
            const artistEl = document.getElementById('artistName');
            const albumEl = document.getElementById('albumName');
            
            titleEl.textContent = song.title;
            artistEl.textContent = song.artist;
            albumEl.textContent = song.album;
            
            if (song.picture) {
                try {
                    const blob = new Blob([new Uint8Array(song.picture.data)], { type: song.picture.format });
                    const url = URL.createObjectURL(blob);
                    albumCoverImg.src = url;
                    albumCoverImg.style.display = 'block';
                    albumPlaceholder.style.display = 'none';
                } catch (e) {
                    console.error('封面加载失败:', e);
                    albumCoverImg.style.display = 'none';
                    albumPlaceholder.style.display = 'flex';
                }
            } else {
                albumCoverImg.style.display = 'none';
                albumPlaceholder.style.display = 'flex';
            }
            
            document.getElementById('emptyMetadata').style.display = 'none';
            document.getElementById('metadataContent').style.display = 'block';
            
            document.getElementById('metaTitle').textContent = song.title;
            document.getElementById('metaArtist').textContent = song.artist;
            document.getElementById('metaAlbum').textContent = song.album || '-';
            document.getElementById('metaYear').textContent = song.year || '-';
            document.getElementById('metaDuration').textContent = song.duration || '-';
            document.getElementById('metaFormat').textContent = song.format || '-';
            document.getElementById('metaHonorTags').innerHTML = formatTagsAsHtml(song.honorTags);
            document.getElementById('metaFeatureTags').innerHTML = formatTagsAsHtml(song.featureTags);
            document.getElementById('metaComments').textContent = formatCommentsAsHtml(song.comments);
            document.getElementById('metaUserReview').textContent = song.userReview || '-';
            document.getElementById('metaArtistIntro').textContent = song.artistIntro || '-';
            
            if (song.matched && song.url) {
                audioPlayer.src = song.url;
                audioPlayer.play();
                isPlaying = true;
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                albumCoverContainer.classList.add('playing');
            } else {
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                albumCoverContainer.classList.remove('playing');
                audioPlayer.src = '';
            }
            
            document.querySelectorAll('.song-item').forEach((item, i) => {
                const songIndex = Array.from(songListEl.children).indexOf(item);
                if (songIndex === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function togglePlay() {
            if (currentIndex === -1) return;
            
            const song = allSongs[currentIndex];
            if (!song.matched || !song.url) return;
            
            if (isPlaying) {
                audioPlayer.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                albumCoverContainer.classList.remove('playing');
            } else {
                audioPlayer.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                albumCoverContainer.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }

        function playPrev() {
            if (matchedIndexes.length === 0) return;
            
            currentMatchedIndex = currentMatchedIndex > 0 ? currentMatchedIndex - 1 : matchedIndexes.length - 1;
            const newIndex = matchedIndexes[currentMatchedIndex];
            playSong(newIndex);
        }

        function playNext() {
            if (matchedIndexes.length === 0) return;
            
            currentMatchedIndex = currentMatchedIndex < matchedIndexes.length - 1 ? currentMatchedIndex + 1 : 0;
            const newIndex = matchedIndexes[currentMatchedIndex];
            playSong(newIndex);
        }

        toggleUnmatchedBtn.addEventListener('click', () => {
            showUnmatched = !showUnmatched;
            toggleUnmatchedBtn.classList.toggle('active', !showUnmatched);
            toggleUnmatchedBtn.innerHTML = showUnmatched 
                ? '<i class="fas fa-eye-slash"></i> 未匹配' 
                : '<i class="fas fa-eye"></i> 显示全部';
            renderPlaylist();
        });

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', playPrev);
        nextBtn.addEventListener('click', playNext);

        folderInput.addEventListener('change', (e) => {
            loadLocalFiles(e.target.files);
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progress.style.width = `${percent}%`;
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('ended', playNext);

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.key) {
                case ' ':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    playPrev();
                    break;
                case 'ArrowRight':
                    playNext();
                    break;
            }
        });

        excelInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                allSongs = [];
                matchedSongs = new Map();
                matchedIndexes = [];
                currentIndex = -1;
                currentMatchedIndex = -1;
                excelFileName = '';
                document.getElementById('playlistTitle').textContent = '播放列表';
                await loadExcelFromFile(file);
            }
        });
    </script>
</body>
</html>
